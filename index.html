<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Scraper</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background: #667eea; }
        .card { background: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        h1 { color: white; text-align: center; }
        h2 { font-size: 1.2rem; margin-top: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { width: 100%; padding: 15px; background: #0088cc; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        .btn-green { background: #28a745; }
        .alert { background: #fff3e0; padding: 15px; border-radius: 8px; margin: 15px 0; border-left: 4px solid #ff9800; }
        code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🚀 Telegram Scraper</h1>
    
    <div class="card">
        <div class="alert">
            <strong>⚠️ Mode: Google Colab / Replit</strong><br>
            GitHub Actions tidak tersedia. Gunakan alternatif di bawah.
        </div>
        
        <h2>Step 1: Isi Data</h2>
        <input type="number" id="apiId" placeholder="API ID">
        <input type="text" id="apiHash" placeholder="API Hash">
        <input type="text" id="phone" placeholder="+6281234567890">
        <textarea id="session" rows="2" placeholder="Session String (wajib)"></textarea>
        <input type="text" id="group" placeholder="Grup: @namagrup">
        <input type="text" id="channel" placeholder="Channel: @channeltujuan">
        
        <button onclick="generateScript()" class="btn">📋 Generate Script</button>
    </div>

    <div class="card" id="output" style="display:none;">
        <h2>Step 2: Copy & Jalankan</h2>
        <p>Copy script di bawah, buka <a href="https://colab.research.google.com" target="_blank">Google Colab</a>, paste, run!</p>
        <textarea id="scriptBox" rows="15" style="font-family: monospace; font-size: 12px;"></textarea>
        <button onclick="copyScript()" class="btn btn-green">📋 Copy Script</button>
    </div>

    <script>
        function generateScript() {
            const apiId = document.getElementById('apiId').value;
            const apiHash = document.getElementById('apiHash').value;
            const phone = document.getElementById('phone').value;
            const session = document.getElementById('session').value;
            const group = document.getElementById('group').value;
            const channel = document.getElementById('channel').value;

            const script = `!pip install telethon
from telethon import TelegramClient
from telethon.sessions import StringSession
import csv

api_id = ${apiId}
api_hash = '${apiHash}'
session_string = '${session}'
source_group = '${group}'
target_channel = '${channel}'

client = TelegramClient(StringSession(session_string), api_id, api_hash)

async def scrape():
    await client.start()
    print("✅ Login berhasil!")
    
    entity = await client.get_entity(source_group)
    print(f"📥 Scraping: {entity.title}")
    
    members = []
    async for member in client.iter_participants(entity):
        members.append({
            'id': member.id,
            'username': member.username or '',
            'first_name': member.first_name or '',
            'last_name': member.last_name or '',
            'is_bot': 'Yes' if member.bot else 'No'
        })
        if len(members) % 100 == 0:
            print(f"Progress: {len(members)}")
    
    # Save
    filename = f"members_{entity.title.replace(' ', '_')}.csv"
    with open(filename, 'w', newline='', encoding='utf-8') as f:
        writer = csv.DictWriter(f, fieldnames=['id', 'username', 'first_name', 'last_name', 'is_bot'])
        writer.writeheader()
        writer.writerows(members)
    
    print(f"✅ Saved: {filename} ({len(members)} members)")
    
    # Send to channel
    await client.send_message(target_channel, f"📊 {len(members)} members from {entity.title}")
    await client.send_file(target_channel, filename)
    print("✅ Sent to channel!")

with client:
    client.loop.run_until_complete(scrape())`;

            document.getElementById('scriptBox').value = script;
            document.getElementById('output').style.display = 'block';
        }

        function copyScript() {
            navigator.clipboard.writeText(document.getElementById('scriptBox').value);
            alert('Script copied! Buka Google Colab dan paste.');
        }
    </script>
</body>
</html>
